name: Fuzz codecs

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  BUILD_TYPE: RELWITHDEBINFO

jobs:
  fuzz-codecs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [jxl, uhdr, tiff, bmp, png, webp, gif, jpeg]

    name: fuzz-${{ matrix.target }}-decode
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Update apt (Ubuntu)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo -E apt-get update -qq -o Acquire::Retries=3

      - name: Add libheif PPA (Ubuntu)
        run: |
          sudo add-apt-repository ppa:strukturag/libde265
          sudo add-apt-repository ppa:strukturag/libheif

      - name: install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get install --fix-missing -qq -o Acquire::Retries=3 \
            cmake clang lld gcc build-essential curl \
            libjpeg-turbo8-dev libjxl-dev libpng-dev libwebp-dev libtiff5-dev \
            ninja-build

      - name: Build and install libultrahdr
        run: |
          curl -L -o /tmp/libultrahdr-1.4.0.tar.gz https://github.com/google/libultrahdr/archive/refs/tags/v1.4.0.tar.gz
          mkdir -p /tmp/libultrahdr-src /tmp/libultrahdr-build
          tar -xzf /tmp/libultrahdr-1.4.0.tar.gz -C /tmp/libultrahdr-src --strip-components=1
          cmake -S /tmp/libultrahdr-src -B /tmp/libultrahdr-build -G "Ninja" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DUHDR_BUILD_TESTS=1
          cmake --build /tmp/libultrahdr-build
          sudo cmake --install /tmp/libultrahdr-build
          sudo ldconfig
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}" >> $GITHUB_ENV

      - name: Configure CMake
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -G "Unix Makefiles" \
            -DENABLE_FUZZERS=1 \
            -DENABLE_PNG=1 -DENABLE_JPEG=1 -DENABLE_JXL=1 \
            -DENABLE_ULTRAHDR=1 -DENABLE_WEBP=1 -DENABLE_TIFF=1 \
            -DENABLE_GD_FORMATS=1 \
            -DBUILD_TESTS=1 -DBUILD_EXAMPLES=0 -DBUILD_DOCS=0 -DBUILD_PROGRAMS=0 -DBUILD_CPACK=0 \
            -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build fuzzer
        run: |
          cmake --build build --target fuzz_${{ matrix.target }}_decode --parallel 4

      - name: Run fuzzer
        env:
          # UBSan: keep going through recoverable issues, log them; ASan halt on error.
          UBSAN_OPTIONS: "halt_on_error=0:print_stacktrace=1"
          ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1:print_stacktrace=1"
        run: |
          # Output corpus dir receives newly-discovered coverage inputs (ephemeral);
          # committed corpus is the seed input (read-only here).
          mkdir -p out/${{ matrix.target }}
          ./build/Bin/fuzz_${{ matrix.target }}_decode \
            -max_total_time=120 \
            -rss_limit_mb=2048 \
            -artifact_prefix=out/${{ matrix.target }}/ \
            out/${{ matrix.target }} \
            tests/fuzzing/corpus/${{ matrix.target }}

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            out/${{ matrix.target }}/crash-*
            out/${{ matrix.target }}/leak-*
            out/${{ matrix.target }}/timeout-*
            out/${{ matrix.target }}/oom-*
          if-no-files-found: ignore
          retention-days: 30
