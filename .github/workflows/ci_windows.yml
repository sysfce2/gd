name: CI Windows

on: workflow_call

permissions: 
  contents: read

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: RELWITHDEBINFO

jobs:
  CI:
    runs-on: windows-latest
    strategy:
          matrix:
            arch:
              - x64
              - x86
              - amd64_arm64
    name: ${{ matrix.arch }}
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install Dependencies
        run: |
          curl -o ${{ matrix.arch }}-windows.7z  https://raw.githubusercontent.com/libgd/libgd-windows-vcpkg-prebuild/main/${{matrix.arch}}-windows.7z
          7z.exe x ${{ matrix.arch }}-windows.7z -o${{github.workspace}}\vcpkgusr

      - name: Build and install libultrahdr
        run: |
          C:\vcpkg\vcpkg.exe install libjpeg-turbo:${{ matrix.arch == 'amd64_arm64' && 'arm64-windows' || format('{0}-windows', matrix.arch) }}
          curl -L -o libultrahdr-1.4.0.tar.gz https://github.com/google/libultrahdr/archive/refs/tags/v1.4.0.tar.gz
          mkdir libultrahdr-src
          mkdir libultrahdr-build
          mkdir libultrahdr-install
          tar -xzf libultrahdr-1.4.0.tar.gz -C libultrahdr-src --strip-components=1
          cmake -S libultrahdr-src -B libultrahdr-build -G "Ninja" -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_INSTALL_PREFIX=${{github.workspace}}\libultrahdr-install -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake -DVCPKG_TARGET_TRIPLET=${{ matrix.arch == 'amd64_arm64' && 'arm64-windows' || format('{0}-windows', matrix.arch) }} -DUHDR_BUILD_TESTS=1
          cmake --build libultrahdr-build --config ${{env.BUILD_TYPE}}
          mkdir libultrahdr-install\include
          mkdir libultrahdr-install\lib
          mkdir libultrahdr-install\bin
          copy libultrahdr-src\ultrahdr_api.h libultrahdr-install\include\
          copy libultrahdr-build\uhdr.lib libultrahdr-install\lib\
          copy libultrahdr-build\uhdr.dll libultrahdr-install\bin\
          if exist libultrahdr-build\ultrahdr_app.exe copy libultrahdr-build\ultrahdr_app.exe libultrahdr-install\bin\
          dir /s /b libultrahdr-install

      - name: Install exiv2 test dependency
        if: matrix.arch == 'x64'
        run: |
          curl -L -o exiv2-msvc.zip https://exiv2.org/builds/exiv2-0.28.8-2022msvc.zip
          7z.exe x exiv2-msvc.zip -o${{github.workspace}}\exiv2

      - name: Configure CMake
        # vcpkg libde265 fails on arm64 and match prefix
        if: matrix.arch == 'amd64_arm64'
        run:  cmake -D CMAKE_GENERATOR="Ninja" -DENABLE_PNG=1 -DENABLE_FREETYPE=1 -DENABLE_JPEG=1
              -DENABLE_GD_FORMATS=1 -DENABLE_TIFF=1 -DENABLE_ULTRAHDR=1 -DBUILD_TEST=1
              -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
              -DCMAKE_PREFIX_PATH=${{github.workspace}}\libultrahdr-install
              -DCMAKE_LIBRARY_PATH="${{github.workspace}}\vcpkgusr\arm64-windows\lib;${{github.workspace}}\libultrahdr-install\lib"
              -DCMAKE_INCLUDE_PATH="${{github.workspace}}\vcpkgusr\arm64-windows\include;${{github.workspace}}\libultrahdr-install\include"

      - name: Configure CMake
        if: matrix.arch != 'amd64_arm64'
        run:  cmake -D CMAKE_GENERATOR="Ninja" -DENABLE_PNG=1 -DENABLE_FREETYPE=1 -DENABLE_JPEG=1
               -DENABLE_GD_FORMATS=1 -DENABLE_TIFF=1 -DENABLE_HEIF=1
              -DENABLE_ULTRAHDR=1 -DBUILD_TEST=1 -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
              -DCMAKE_PREFIX_PATH=${{github.workspace}}\libultrahdr-install
              -DCMAKE_LIBRARY_PATH="${{github.workspace}}\vcpkgusr\${{ matrix.arch }}-windows\lib;${{github.workspace}}\libultrahdr-install\lib"
              -DCMAKE_INCLUDE_PATH="${{github.workspace}}\vcpkgusr\${{ matrix.arch }}-windows\include;${{github.workspace}}\libultrahdr-install\include"
              ${{ matrix.arch == 'x64' && format('-DEXIV2_ROOT={0}\\exiv2\\exiv2-0.28.8-2022msvc-AMD64', github.workspace) || '' }}

      - name: Build
        run: |
         cd ${{github.workspace}}/build
         cmake --build . --config ${{env.BUILD_TYPE}}

      - name: Tests
        working-directory: ${{github.workspace}}/build
        # skip test for cross builds
        if: matrix.arch != 'amd64_arm64'
        run: |
          echo ${{runner.temp}}
          echo %TMP%
          echo %TEMP%
          set PATH=${{github.workspace}}\vcpkgusr\${{ matrix.arch }}-windows\bin;%PATH%
          set PATH=${{github.workspace}}\libultrahdr-install\bin;%PATH%
          if exist ${{github.workspace}}\exiv2\exiv2-0.28.8-2022msvc-AMD64\bin set PATH=${{github.workspace}}\exiv2\exiv2-0.28.8-2022msvc-AMD64\bin;%PATH%
          set CTEST_OUTPUT_ON_FAILURE=1
          ctest -C ${{env.BUILD_TYPE}}
